<div class="p-6 bg-gray-50 min-h-screen">
  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-3xl font-bold text-gray-800">
        {{ "calendar.title" | translate }}
      </h1>
      <p class="text-gray-600 mt-1">{{ "calendar.subtitle" | translate }}</p>
    </div>
    <p-button
      [label]="'calendar.addEvent' | translate"
      icon="pi pi-plus"
      styleClass="flex items-center gap-2 bg-blue-500 text-white py-2 px-3 hover:bg-blue-600 rounded-lg"
      (click)="addEvent()"
    ></p-button>
  </div>

  <!-- Calendar Card -->
  <div class="bg-white rounded-lg shadow-sm p-6">
    <full-calendar [options]="calendarOptions"></full-calendar>
  </div>
</div>
