<form [formGroup]="eventForm" class="p-6 space-y-5">
  <!-- Header -->
  <div class="flex items-center gap-4">
    <div class="w-16 h-16 rounded-xl bg-blue-50 flex items-center justify-center text-blue-500 text-2xl flex-shrink-0">
      <i class="pi pi-calendar-plus"></i>
    </div>
    <div>
      <p class="text-sm font-medium text-gray-700 mb-1">{{ 'calendar.addEventTitle' | translate }}</p>
      <p class="text-xs text-gray-500">{{ 'calendar.addEventDescription' | translate }}</p>
    </div>
  </div>

  <p-divider styleClass="my-1"></p-divider>

  <!-- Form grid -->
  <div class="grid grid-cols-2 gap-x-6 gap-y-4">
    <!-- Event Title -->
    <div class="flex flex-col gap-1 col-span-2">
      <div class="flex gap-2 items-center">
        <i class="pi pi-bookmark text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600">
          {{ 'calendar.eventTitle' | translate }} <span class="text-red-400">*</span>
        </label>
      </div>
      <input
        pInputText
        class="w-full"
        [placeholder]="'calendar.eventTitlePlaceholder' | translate"
        formControlName="title"
        [class.p-invalid]="eventForm.get('title')?.invalid && eventForm.get('title')?.touched"
      />
      <small *ngIf="eventForm.get('title')?.errors?.['required'] && eventForm.get('title')?.touched" class="p-error">
        {{ 'calendar.eventTitleRequired' | translate }}
      </small>
    </div>

    <!-- Event Type -->
    <div class="flex flex-col gap-1">
      <div class="flex gap-2 items-center">
        <i class="pi pi-tag text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600">
          {{ 'calendar.eventType' | translate }} <span class="text-red-400">*</span>
        </label>
      </div>
      <p-dropdown
        [options]="eventTypes"
        formControlName="type"
        optionLabel="label"
        optionValue="value"
        [placeholder]="'calendar.eventTypePlaceholder' | translate"
        styleClass="w-full"
      >
        <ng-template let-item pTemplate="item">
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full" [style.background-color]="item.color"></div>
            <span>{{ item.label }}</span>
          </div>
        </ng-template>
      </p-dropdown>
    </div>

    <!-- Status -->
    <div class="flex flex-col gap-1">
      <div class="flex gap-2 items-center">
        <i class="pi pi-info-circle text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600">
          {{ 'calendar.status' | translate }} <span class="text-red-400">*</span>
        </label>
      </div>
      <p-dropdown
        [options]="statusOptions"
        formControlName="status"
        optionLabel="label"
        optionValue="value"
        [placeholder]="'calendar.statusPlaceholder' | translate"
        styleClass="w-full"
      ></p-dropdown>
    </div>

    <!-- Priority -->
    <div class="flex flex-col gap-1">
      <div class="flex gap-2 items-center">
        <i class="pi pi-flag text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600">{{ 'calendar.priority' | translate }}</label>
      </div>
      <p-dropdown
        [options]="priorityOptions"
        formControlName="priority"
        optionLabel="label"
        optionValue="value"
        [placeholder]="'calendar.priorityPlaceholder' | translate"
        styleClass="w-full"
      ></p-dropdown>
    </div>

    <!-- Assigned To -->
    <div class="flex flex-col gap-1">
      <div class="flex gap-2 items-center">
        <i class="pi pi-user text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600">{{ 'calendar.assignedTo' | translate }}</label>
      </div>
      <p-dropdown
        [options]="employees"
        formControlName="assignedTo"
        optionLabel="name"
        optionValue="id"
        [placeholder]="'calendar.assignedToPlaceholder' | translate"
        styleClass="w-full"
        [showClear]="true"
      ></p-dropdown>
    </div>

    <!-- All Day Checkbox -->
    <div class="flex items-center gap-2 col-span-2">
      <p-checkbox
        formControlName="allDay"
        inputId="allDay"
        (onChange)="onAllDayChange()"
      ></p-checkbox>
      <label for="allDay" class="text-sm font-medium text-gray-600 cursor-pointer">
        {{ 'calendar.allDay' | translate }}
      </label>
    </div>

    <!-- Start Time -->
    <div class="flex flex-col gap-1">
      <div class="flex gap-2 items-center">
        <i class="pi pi-calendar text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600">
          {{ 'calendar.startTime' | translate }} <span class="text-red-400">*</span>
        </label>
      </div>
      <p-calendar
        formControlName="startTime"
        [placeholder]="'calendar.startTimePlaceholder' | translate"
        dateFormat="dd/mm/yy"
        [showIcon]="true"
        [showTime]="!eventForm.get('allDay')?.value"
        hourFormat="24"
        styleClass="w-full"
        appendTo="body"
        [class.p-invalid]="eventForm.get('startTime')?.invalid && eventForm.get('startTime')?.touched"
      ></p-calendar>
      <small *ngIf="eventForm.get('startTime')?.errors?.['required'] && eventForm.get('startTime')?.touched" class="p-error">
        {{ 'calendar.startTimeRequired' | translate }}
      </small>
    </div>

    <!-- End Time -->
    <div class="flex flex-col gap-1">
      <div class="flex gap-2 items-center">
        <i class="pi pi-calendar-times text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600">
          {{ 'calendar.endTime' | translate }} <span class="text-red-400">*</span>
        </label>
      </div>
      <p-calendar
        formControlName="endTime"
        [placeholder]="'calendar.endTimePlaceholder' | translate"
        dateFormat="dd/mm/yy"
        [showIcon]="true"
        [showTime]="!eventForm.get('allDay')?.value"
        hourFormat="24"
        styleClass="w-full"
        appendTo="body"
        [class.p-invalid]="eventForm.get('endTime')?.invalid && eventForm.get('endTime')?.touched"
      ></p-calendar>
      <small *ngIf="eventForm.get('endTime')?.errors?.['required'] && eventForm.get('endTime')?.touched" class="p-error">
        {{ 'calendar.endTimeRequired' | translate }}
      </small>
    </div>

    <!-- Location -->
    <div class="flex flex-col gap-1">
      <div class="flex gap-2 items-center">
        <i class="pi pi-map-marker text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600">{{ 'calendar.location' | translate }}</label>
      </div>
      <input
        pInputText
        class="w-full"
        [placeholder]="'calendar.locationPlaceholder' | translate"
        formControlName="location"
      />
    </div>

    <!-- Meeting URL -->
    <div class="flex flex-col gap-1">
      <div class="flex gap-2 items-center">
        <i class="pi pi-link text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600">{{ 'calendar.meetingUrl' | translate }}</label>
      </div>
      <input
        pInputText
        class="w-full"
        [placeholder]="'calendar.meetingUrlPlaceholder' | translate"
        formControlName="meetingUrl"
      />
    </div>

    <!-- Company -->
    <div class="flex flex-col gap-1">
      <div class="flex gap-2 items-center">
        <i class="pi pi-building text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600">{{ 'calendar.company' | translate }}</label>
      </div>
      <p-dropdown
        [options]="companies"
        formControlName="companyId"
        optionLabel="name"
        optionValue="id"
        [placeholder]="'calendar.companyPlaceholder' | translate"
        styleClass="w-full"
        [showClear]="true"
      ></p-dropdown>
    </div>

    <!-- Project -->
    <div class="flex flex-col gap-1">
      <div class="flex gap-2 items-center">
        <i class="pi pi-folder text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600">{{ 'calendar.project' | translate }}</label>
      </div>
      <p-dropdown
        [options]="projects"
        formControlName="projectId"
        optionLabel="name"
        optionValue="id"
        [placeholder]="'calendar.projectPlaceholder' | translate"
        styleClass="w-full"
        [showClear]="true"
      ></p-dropdown>
    </div>

    <!-- Description -->
    <div class="flex flex-col gap-1 col-span-2">
      <label class="text-sm font-medium text-gray-600">{{ 'calendar.description' | translate }}</label>
      <textarea
        pInputTextarea
        formControlName="description"
        rows="4"
        class="w-full resize-none"
        [placeholder]="'calendar.descriptionPlaceholder' | translate"
      ></textarea>
    </div>
  </div>

  <!-- Actions -->
  <div class="flex justify-end gap-3 pt-2 border-t border-gray-100">
    <button
      pButton
      [label]="'calendar.cancel' | translate"
      class="p-button-text p-button-secondary px-4 py-2 rounded-lg"
      (click)="onCancel()"
    ></button>
    <button
      pButton
      class="p-button-primary px-4 py-2 rounded-lg shadow"
      [label]="'calendar.saveEvent' | translate"
      icon="pi pi-check"
      [disabled]="eventForm.invalid"
      (click)="onSave()"
    ></button>
  </div>
</form>
