<form [formGroup]="companyForm" class="p-6 space-y-5">
  <!-- Logo row -->
  <div class="flex items-center gap-4">
    <div
      class="w-16 h-16 rounded-xl bg-blue-50 flex items-center justify-center text-blue-500 text-2xl flex-shrink-0"
    >
      <img
        *ngIf="companyForm.get('avatar')?.value !== ''; else noImage"
        [src]="'http://localhost:3000' + companyForm.get('avatar')?.value"
      />
      <ng-template #noImage>
        <i class="pi pi-building"></i>
      </ng-template>
    </div>
    <div>
      <p class="text-sm font-medium text-gray-700 mb-1">Company Logo</p>
      <upload-file [attachments]="avatarAttachments"></upload-file>
    </div>
  </div>

  <p-divider styleClass="my-1"></p-divider>

  <!-- Form grid -->
  <div class="grid grid-cols-2 gap-x-6 gap-y-4">
    <!-- Company Name -->
    <div class="flex flex-col gap-1">
      <div class="flex gap-2 items-center">
        <i class="pi pi-building text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600"
          >Company Name <span class="text-red-400">*</span></label
        >
      </div>
      <span class="p-input-icon-left w-full">
        <input
          pInputText
          class="w-full"
          placeholder="ABC Corp."
          [formControlName]="'name'"
          [class.p-invalid]="
            companyForm.get('name')?.invalid &&
            (companyForm.get('name')?.touched || companyForm.get('name')?.dirty)
          "
        />
      </span>
      <small
        *ngIf="
          companyForm.get('name')?.errors?.['required'] &&
          companyForm.get('name')?.touched
        "
        class="p-error"
        >Company name is required</small
      >
      <small
        *ngIf="companyForm.get('name')?.errors?.['maxlength']"
        class="p-error"
      >
        Maximum 255 characters allowed.
      </small>

      <small
        *ngIf="companyForm.get('name')?.errors?.['pattern']"
        class="p-error"
      >
        No leading or trailing spaces allowed.
      </small>
    </div>
    <!-- Owner -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-600">Owner</label>
      <p-dropdown
        [options]="users"
        [formControlName]="'ownerId'"
        optionLabel="ownerName"
        optionValue="ownerId"
        placeholder="Assign owner"
        styleClass="w-full"
        [class.p-invalid]="
          companyForm.get('ownerId')?.invalid &&
          companyForm.get('ownerId')?.touched
        "
      ></p-dropdown>
      <small
        *ngIf="
          companyForm.get('ownerId')?.errors?.['required'] &&
          companyForm.get('ownerId')?.touched
        "
        class="p-error"
        >Owner name is required</small
      >
    </div>

    <!-- Industry -->
    <div class="flex flex-col gap-1">
      <div class="flex gap-2 items-center">
        <i class="pi pi-tag text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600">Industry</label>
      </div>
      <span class="p-input-icon-left w-full">
        <input
          pInputText
          class="w-full"
          placeholder="Technology"
          [formControlName]="'industry'"
          [class.p-invalid]="
            companyForm.get('industry')?.invalid &&
            (companyForm.get('industry')?.touched ||
              companyForm.get('industry')?.dirty)
          "
        />
      </span>
      <small
        *ngIf="
          companyForm.get('industry')?.errors?.['required'] &&
          companyForm.get('industry')?.touched
        "
        class="p-error"
        >Industry name is required</small
      >
    </div>

    <!-- Tags -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-600">Tags</label>
      <p-multiSelect
        [options]="tags"
        formControlName="selectedTags"
        optionLabel="name"
        placeholder="Select Tags"
        styleClass="w-full"
      />
    </div>

    <!-- Website -->
    <div class="flex flex-col gap-1">
      <div class="flex gap-2 items-center">
        <i class="pi pi-globe text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600">Website</label>
      </div>
      <span class="p-input-icon-left w-full">
        <input
          [formControlName]="'website'"
          pInputText
          class="w-full"
          placeholder="https://example.com"
          [class.p-invalid]="
            companyForm.get('website')?.invalid &&
            (companyForm.get('website')?.touched ||
              companyForm.get('website')?.dirty)
          "
        />
      </span>
      <small
        *ngIf="
          companyForm.get('website')?.errors?.['required'] &&
          companyForm.get('website')?.touched
        "
        class="p-error"
        >Website name is required</small
      >
    </div>

    <!-- Company Size -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-600">Company Size</label>
      <!-- <p-dropdown
        [options]="sizes"
        [editable]="true"
        placeholder="Select or type size..."
        styleClass="w-full"
        [formControlName]="'size'"
        (onInput)="onSizeInput($event)"
        [class.p-invalid]="
          companyForm.get('size')?.invalid &&
          (companyForm.get('size')?.touched || companyForm.get('size')?.dirty)
        "
      ></p-dropdown> -->
      <p-inputNumber
        [formControlName]="'size'"
        [min]="1"
        placeholder="Enter company size"
        styleClass="w-full"
        [class.p-invalid]="
          companyForm.get('size')?.invalid &&
          (companyForm.get('size')?.touched || companyForm.get('size')?.dirty)
        "
      ></p-inputNumber>
      <small
        *ngIf="
          companyForm.get('size')?.errors?.['required'] &&
          companyForm.get('size')?.touched
        "
        class="p-error"
        >Company size is required</small
      >
    </div>

    <!-- Address -->
    <div class="flex flex-col gap-1">
      <div class="flex gap-2 items-center">
        <i class="pi pi-map-marker text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600">Address</label>
      </div>
      <span class="p-input-icon-left w-full">
        <input
          pInputText
          class="w-full"
          placeholder="New York, USA"
          [formControlName]="'address'"
          [class.p-invalid]="
            companyForm.get('address')?.invalid &&
            (companyForm.get('address')?.touched ||
              companyForm.get('address')?.dirty)
          "
        />
      </span>
      <small
        *ngIf="
          companyForm.get('address')?.errors?.['required'] &&
          companyForm.get('address')?.touched
        "
        class="p-error"
        >Address is required</small
      >
    </div>

    <!-- Phone -->
    <div class="flex flex-col gap-1">
      <div class="flex gap-2 items-center">
        <i class="pi pi-phone text-gray-400"></i>
        <label class="text-sm font-medium text-gray-600">Phone</label>
      </div>
      <span class="p-input-icon-left w-full">
        <input
          pInputText
          class="w-full"
          placeholder="+1 234 567 890"
          [formControlName]="'phoneNo'"
          [class.p-invalid]="
            companyForm.get('phoneNo')?.invalid &&
            (companyForm.get('phoneNo')?.touched ||
              companyForm.get('phoneNo')?.dirty)
          "
        />
      </span>
      <small
        *ngIf="
          companyForm.get('phoneNo')?.errors?.['required'] &&
          companyForm.get('phoneNo')?.touched
        "
        class="p-error"
        >Phone number is required</small
      >
    </div>

    <!-- Notes — full width -->
    <div class="flex flex-col gap-1 col-span-2">
      <label class="text-sm font-medium text-gray-600">Notes</label>
      <textarea
        pInputTextarea
        rows="4"
        class="w-full resize-none"
        placeholder="Add any notes about this company..."
      ></textarea>
    </div>
  </div>

  <!-- Actions -->
  <div class="flex justify-end gap-3 pt-2 border-t border-gray-100">
    <button
      pButton
      label="Cancel"
      class="p-button-text p-button-secondary px-4 py-2 rounded-lg"
      (click)="onClose()"
    ></button>
    <button
      pButton
      class="p-button-primary px-4 py-2 rounded-lg shadow"
      label="Create"
      icon="pi pi-check"
      (click)="onSave()"
    ></button>
  </div>
</form>
